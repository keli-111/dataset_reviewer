name: Build macOS app

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build app
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --windowed \
            --name YoloDatasetReviewer \
            main.py

      - name: Zip app bundle
        run: |
          cd dist
          ditto -c -k --keepParent YoloDatasetReviewer.app YoloDatasetReviewer-mac-app.zip

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: YoloDatasetReviewer-mac-app
          path: dist/YoloDatasetReviewer-mac-app.zip
